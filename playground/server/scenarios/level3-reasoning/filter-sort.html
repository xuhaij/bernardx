<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter and Sort — BernardX Playground</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar select, .toolbar button { padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; border: 1px solid var(--color-border); }
    .toolbar button { background: var(--color-primary); color: white; border: none; cursor: pointer; }
    .star { color: #f59e0b; }
    .products { display: flex; flex-direction: column; gap: 8px; }
    .product-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; border: 1px solid var(--color-border); border-radius: 4px;
    }
    .product-row .name { font-weight: 500; }
    .product-row .cat { font-size: 0.8rem; color: var(--color-text-muted); }
  </style>
</head>
<body>
  <header class="scenario-header">
    <span class="level-badge">Level 3</span>
    <h1>Filter and Sort Products</h1>
    <p class="task-description">Show Electronics with 4+ stars, sort by price, add the cheapest result.</p>
  </header>

  <main class="card">
    <div class="toolbar">
      <select id="category-filter">
        <option value="all">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Home">Home</option>
      </select>
      <select id="rating-filter">
        <option value="0">All Ratings</option>
        <option value="4">4+ Stars</option>
        <option value="4.5">4.5+ Stars</option>
      </select>
      <select id="sort">
        <option value="default">Default Order</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
      </select>
      <button id="apply-btn">Apply</button>
    </div>

    <div id="product-list" class="products"></div>
    <div id="result" class="result" style="display:none;"></div>
  </main>

  <script src="/js/playground-client.js"></script>
  <script>
    var allProducts = [
      { name: 'Wireless Mouse', category: 'Electronics', price: 29.99, rating: 4.5 },
      { name: 'USB-C Hub', category: 'Electronics', price: 24.99, rating: 4.2 },
      { name: 'Mechanical Keyboard', category: 'Electronics', price: 89.99, rating: 3.8 },
      { name: 'Cotton T-Shirt', category: 'Clothing', price: 19.99, rating: 4.7 },
      { name: 'Running Shoes', category: 'Clothing', price: 59.99, rating: 4.3 },
      { name: 'Desk Lamp', category: 'Home', price: 34.99, rating: 4.1 },
      { name: 'Bluetooth Speaker', category: 'Electronics', price: 49.99, rating: 3.5 },
      { name: 'Yoga Mat', category: 'Home', price: 24.99, rating: 4.8 },
    ];

    function render(products) {
      var list = document.getElementById('product-list');
      list.innerHTML = '';
      products.forEach(function(p) {
        var stars = '';
        for (var i = 0; i < 5; i++) stars += i < Math.floor(p.rating) ? '<span class="star">★</span>' : '☆';
        var div = document.createElement('div');
        div.className = 'product-row';
        div.innerHTML = '<div><span class="name">' + p.name + '</span> <span class="cat">' + p.category + '</span><br>' +
          '<small>' + stars + ' ' + p.rating + '</small></div>' +
          '<div style="display:flex;align-items:center;gap:12px;">' +
          '<span style="font-weight:700;">$' + p.price.toFixed(2) + '</span>' +
          '<button class="btn btn-primary btn-sm" data-name="' + p.name + '" data-price="' + p.price + '">Add</button></div>';
        list.appendChild(div);
      });
      list.querySelectorAll('.btn-sm').forEach(function(btn) {
        btn.addEventListener('click', function() {
          playground.submit('/api/l3-filter-sort/add-to-cart', {
            productName: this.dataset.name, price: this.dataset.price
          }, function(resp) {
            if (resp.success) playground.showResult(resp.message, true);
          });
        });
      });
    }

    document.getElementById('apply-btn').addEventListener('click', function() {
      var cat = document.getElementById('category-filter').value;
      var minRating = parseFloat(document.getElementById('rating-filter').value);
      var sort = document.getElementById('sort').value;
      var filters = [];
      var filtered = allProducts.slice();
      if (cat !== 'all') { filtered = filtered.filter(function(p) { return p.category === cat; }); filters.push('category:' + cat); }
      if (minRating > 0) { filtered = filtered.filter(function(p) { return p.rating >= minRating; }); filters.push('rating>=' + minRating); }
      if (sort === 'price-asc') filtered.sort(function(a, b) { return a.price - b.price; });
      if (sort === 'price-desc') filtered.sort(function(a, b) { return b.price - a.price; });

      playground.submit('/api/l3-filter-sort/filter', { filter: filters.join(',') }, function() {
        render(filtered);
      });
    });

    render(allProducts);
  </script>
</body>
</html>

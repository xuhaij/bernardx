<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Form Errors — BernardX Playground</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .error-list { color: var(--color-error); font-size: 0.85rem; margin-top: 8px; }
    .error-list li { margin-bottom: 2px; }
    .hint { background: #fef3c7; padding: 8px 12px; border-radius: 4px; font-size: 0.85rem; color: #92400e; margin-top: 8px; }
  </style>
</head>
<body>
  <header class="scenario-header">
    <span class="level-badge">Level 5</span>
    <h1>Fix Form Errors</h1>
    <p class="task-description">Submit the contact form, read any error messages, fix them, and try again.</p>
  </header>

  <main class="card">
    <form id="form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="3" placeholder="Enter your message"></textarea>
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary">Submit</button>
    </form>
    <ul id="error-list" class="error-list" style="display:none;"></ul>
    <div id="hint" class="hint" style="display:none;"></div>
    <div id="result" class="result" style="display:none;"></div>
  </main>

  <script src="/js/playground-client.js"></script>
  <script>
    document.getElementById('form').addEventListener('submit', function(e) {
      e.preventDefault();
      var data = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        message: document.getElementById('message').value,
      };
      playground.submit('/api/l5-form-errors/submit', data, function(resp) {
        if (resp.success) {
          playground.showResult(resp.message, true);
          document.getElementById('error-list').style.display = 'none';
          document.getElementById('hint').style.display = 'none';
        } else {
          playground.showResult('Submission failed. Check errors below.', false);
          var list = document.getElementById('error-list');
          list.innerHTML = '';
          resp.errors.forEach(function(err) {
            var li = document.createElement('li');
            li.textContent = err;
            list.appendChild(li);
          });
          list.style.display = 'block';
          if (resp.hint) {
            var hint = document.getElementById('hint');
            hint.textContent = resp.hint;
            hint.style.display = 'block';
          }
        }
      });
    });
  </script>
</body>
</html>
